{% extends "base.html" %}
{% block content %}
<main id="contenu" class="container article">
  <nav class="breadcrumb" aria-label="Fil d’Ariane"><a href="/">Accueil</a> / Blog / {{ post.titre }}</nav>
  <p class="section-kicker">Guide Movigo33</p>
  <h1>{{ post.titre }}</h1>
  <picture>
    {% if post.image_webp %}<source type="image/webp" srcset="/static/images/{{ post.image_webp }}">{% endif %}
    <img loading="eager" fetchpriority="high" decoding="async" src="/static/images/{{ post.image }}" alt="{{ post.titre }}" class="detail-image" width="900" height="600">
  </picture>
  <p class="lead">{{ post.excerpt }}</p>
  <div>{{ post.description | safe }}</div>
  <a class="btn dark" href="/">Retour à l’accueil</a>
</main>
{% endblock %}
